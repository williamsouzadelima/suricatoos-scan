# http-context: hide nginx version on every vhost/port (audit follow-up 2026-06-28)
server_tokens off;

# ---- HTTP (80): ACME http-01 challenge + redirect everything else to HTTPS ----
server {
    listen                                          80 default_server;
    listen                                          [::]:80 default_server;
    server_name                                     score.suricatoos.com;

    location /.well-known/acme-challenge/ {
        root                                        /var/www/certbot;
        default_type                                "text/plain";
    }

    location / {
        return                                      301 https://$host$request_uri;
    }
}

server {
    listen                                          443 ssl;
    listen                                          [::]:443 ssl;
    http2                                           on;
    server_name                                     score.suricatoos.com;

    charset                                         utf-8;
    keepalive_timeout                               70;
    client_max_body_size                            100M;

    # Hide nginx version in error pages / Server header detail
    server_tokens                                   off;
    add_header                                      Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_read_timeout                          300;
        proxy_connect_timeout                       300;
        proxy_redirect                              off;
        proxy_set_header                            Host $host;
        proxy_set_header                            X-Real-IP $remote_addr;
        proxy_set_header                            X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header                            X-Forwarded-Proto $scheme;
        proxy_pass                                  http://suricatoos:8000/;
    }

    location /staticfiles/ {
        alias /usr/src/app/staticfiles/;
    }

    location /protected_media/ {
        internal;
        alias /usr/src/scan_results/;
        autoindex off;
    }

    ssl_protocols                                   TLSv1.2 TLSv1.3;
    ssl_certificate                                 /etc/letsencrypt/live/score.suricatoos.com/fullchain.pem;
    ssl_certificate_key                             /etc/letsencrypt/live/score.suricatoos.com/privkey.pem;
    ssl_trusted_certificate                         /etc/letsencrypt/live/score.suricatoos.com/chain.pem;
    ssl_ciphers                                     '!EDH:!EXP:!SHA:!DSS:EECDH+aRSA+AESGCM:EECDH+aRSA+SHA384:EECDH+aRSA+SHA256';
    ssl_prefer_server_ciphers                       on;
    ssl_ecdh_curve                                  secp384r1:X25519:prime256v1;
    ssl_session_cache                               shared:SSL:10m;
    ssl_session_timeout                             5m;
    ssl_session_tickets                             off;
}
