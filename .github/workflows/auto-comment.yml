name: рЯТђ Auto Comment

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, closed]
  pull_request_target:
    types: [opened, closed]

permissions:
  issues: write
  pull-requests: write

jobs:
  auto_comment:
    runs-on: ubuntu-latest
    steps:
      - name: рЯ§Ц Auto Comment on Issues and PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const { owner, repo } = context.repo;
            const author = context.payload.sender.login;
            
            if (context.eventName === 'issues' && context.payload.action === 'opened') {
              const issueTitle = context.payload.issue.title.toLowerCase();
              let commentBody;
              
              if (issueTitle.includes('feat')) {
                commentBody = `Hey @${author}! рЯЪА Thanks for this exciting feature idea!

            We love seeing fresh concepts that could take Suricatoos to the next level. рЯМЯ
            
            To help us understand your vision better, could you:
            
            рЯУЭ Provide a detailed description of the feature
            рЯОѓ Explain the problem it solves or the value it adds
            рЯТ° Share any implementation ideas you might have
            
            Your input is invaluable in shaping the future of Suricatoos. Let's innovate together! рЯТ™`;
              } else {
                commentBody = `Hey @${author}! рЯСЛ Thanks for flagging this bug! рЯРЫрЯФН

            You're our superhero bug hunter! рЯ¶ЄвАНвЩВпЄПрЯ¶ЄвАНвЩАпЄП Before we suit up to squash this bug, could you please:
            
            рЯУЪ Double-check our documentation: https://suricatoos.wiki
            рЯХµпЄП Make sure it's not a known issue
            рЯУЭ Provide all the juicy details about this sneaky bug
            
            Once again - thanks for your vigilance! рЯЫ†пЄПрЯЪА`;
              }
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner,
                repo,
                body: commentBody
              });
            } else if ((context.eventName === 'pull_request' || context.eventName === 'pull_request_target') && context.payload.action === 'opened') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner,
                repo,
                body: `Woohoo @${author}! рЯОЙ You've just dropped some hot new code! рЯФ•

            Hang tight while we review this! You rock! рЯ§Ш`
              });
            } else if ((context.eventName === 'pull_request' || context.eventName === 'pull_request_target') && context.payload.action === 'closed') {
              const isPRMerged = context.payload.pull_request.merged;
              let commentBody;

              if (isPRMerged) {
                commentBody = `Holy smokes! рЯ§ѓ You've just made Suricatoos even more awesome!

            Your code is now part of the Suricatoos hall of fame. рЯПЖ 
            
            Keep the cool ideas coming - maybe next time you'll break the internet! рЯТїрЯТ•

            Virtual high fives all around! рЯЩМ`;
              } else {
                commentBody = `Hey, thanks for your contribution! рЯЩП

            We appreciate the time and effort you put into this PR. Sadly this is not the right fit for Suricatoos at the moment.
            
            While we couldn't merge it this time, we value your interest in improving Suricatoos.
            
            Feel free to reach out if you have any questions. Thanks again!`;
              }

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner,
                repo,
                body: commentBody
              });
            }