x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    logging: *default-logging
    restart: always
    image: "postgres:16-alpine"
    # 3.8GB box shared with co-tenants: cap each container so a runaway tool is OOM-killed
    # inside its container (detectable, .State.OOMKilled) instead of starving the whole host.
    mem_limit: 384m
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data_16:/var/lib/postgresql/data/
    networks:
      - suricatoos_network

  redis:
    logging: *default-logging
    restart: always
    image: "redis:alpine"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    hostname: redis
    mem_limit: 256m
    networks:
      - suricatoos_network

  celery:
    logging: *default-logging
    build:
      context: ./web
    restart: always
    # Run an init (tini) as PID 1 so orphaned subprocess zombies are reaped. The
    # entrypoint is a bash script (a poor reaper): when the watchdog SIGKILLs a stuck
    # tool (e.g. nuclei) the child gets reparented to PID 1 and, without an init,
    # lingers as a <defunct> zombie forever (observed after the scan-#28 hang).
    init: true
    # Heaviest container (runs every scan tool). Cap RAM so a runaway tool is OOM-killed inside
    # this container instead of starving the host; a little swap headroom (Docker default) is
    # left as a buffer. Hangs are handled by the per-tool watchdog + Celery time limits.
    mem_limit: 2g
    entrypoint: /usr/src/app/celery-entrypoint.sh
    # command: celery -A Suricatoos worker --autoscale=${MAX_CONCURRENCY},${MIN_CONCURRENCY} -l INFO
    volumes:
      - ./web:/usr/src/app:ro
      - wordlist:/usr/src/wordlist
      - scan_results:/usr/src/scan_results
      - gf_patterns:/root/.gf
      - nuclei_templates:/root/nuclei-templates
      - tool_config:/root/.config
      - static_volume:/usr/src/app/staticfiles/
      # ADR-0006: cert mTLS 'launcher' p/ o loop reNgine→OpenVAS (somente leitura).
      - ./secrets:/certs:ro
    environment:
      - DEBUG=0
      - CELERY_BROKER=redis://:${REDIS_PASSWORD}@redis:6379/0
      - PYTHONDONTWRITEBYTECODE=1
      - SURICATOOS_LOG_TO_STDOUT=1
      - RENGINE_VAULT_KEY=${RENGINE_VAULT_KEY:-}
      - CELERY_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DOMAIN_NAME=${DOMAIN_NAME}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - MAX_CONCURRENCY=${MAX_CONCURRENCY}
      - MIN_CONCURRENCY=${MIN_CONCURRENCY}
      - SHARED_CONCURRENCY=${SHARED_CONCURRENCY:-10}
      # Dedicated gevent worker for the blocking scan coordinators; greenlets are cheap
      # so this can be high without memory cost (see celery-entrypoint.sh).
      - COORDINATOR_CONCURRENCY=${COORDINATOR_CONCURRENCY:-30}
      # Backstop deadline for every fan-out barrier (see definitions.py). 0 disables.
      - ORCHESTRATION_BARRIER_TIMEOUT=${ORCHESTRATION_BARRIER_TIMEOUT:-7200}
      - GITGUARDIAN_API_KEY=${GITGUARDIAN_API_KEY}
    depends_on:
      - db
      - redis
    networks:
      - suricatoos_network

  celery-beat:
    logging: *default-logging
    restart: unless-stopped
    build: ./web
    entrypoint: /usr/src/app/beat-entrypoint.sh
    command: celery -A Suricatoos beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - CELERY_BROKER=redis://:${REDIS_PASSWORD}@redis:6379/0
      - PYTHONDONTWRITEBYTECODE=1
      - SURICATOOS_LOG_TO_STDOUT=1
      - RENGINE_VAULT_KEY=${RENGINE_VAULT_KEY:-}
      - CELERY_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_HOST=${POSTGRES_HOST}
    depends_on:
      - celery
      - db
    volumes:
      - ./web:/usr/src/app:ro
      - wordlist:/usr/src/wordlist
      - scan_results:/usr/src/scan_results
      - gf_patterns:/root/.gf
      - nuclei_templates:/root/nuclei-templates
      - tool_config:/root/.config
      # ADR-0006: cert mTLS 'launcher' p/ o loop reNgine→OpenVAS (somente leitura).
      - ./secrets:/certs:ro
    networks:
      - suricatoos_network

  web:
    logging: *default-logging
    build:
      context: ./web
    entrypoint: /usr/src/app/entrypoint.sh
    # Reap orphaned subprocess zombies (WHOIS / tool endpoints spawn subprocesses).
    init: true
    restart: always
    mem_limit: 640m
    image: suricatoos/web:latest
    environment:
      - DEBUG=0
      - CELERY_BROKER=redis://:${REDIS_PASSWORD}@redis:6379/0
      - PYTHONDONTWRITEBYTECODE=1
      - SURICATOOS_LOG_TO_STDOUT=1
      - RENGINE_VAULT_KEY=${RENGINE_VAULT_KEY:-}
      - CELERY_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DOMAIN_NAME=${DOMAIN_NAME}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    volumes:
      - ./web:/usr/src/app:ro
      - wordlist:/usr/src/wordlist
      - scan_results:/usr/src/scan_results
      - gf_patterns:/root/.gf
      - nuclei_templates:/root/nuclei-templates
      - tool_config:/root/.config
      - static_volume:/usr/src/app/staticfiles/
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - db
      - celery
      - celery-beat
    networks:
      suricatoos_network:
        aliases:
          - suricatoos

  proxy:
    logging: *default-logging
    restart: always
    image: nginx:alpine
    ports:
      - 80:80/tcp
      - 443:443/tcp
    depends_on:
      - web
      - db
      - redis
    volumes:
      - ./config/nginx/suricatoos.conf:/etc/nginx/conf.d/suricatoos.conf:ro
      - ./config/nginx/default-empty.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - static_volume:/usr/src/app/staticfiles/
      - scan_results:/usr/src/scan_results
    networks:
      - suricatoos_network
  ollama:
    logging: *default-logging
    restart: unless-stopped
    image: ollama/ollama
    container_name: ollama
    # VM pequena (3.8GB): ollama ocioso e leve, mas carregar um modelo em CPU
    # pode consumir toda a RAM e travar o host. O limite contem o ollama (ele
    # sofre OOM-kill em vez de derrubar a maquina inteira).
    # 2g cabe o FP-judge local (qwen2.5:1.5b, ~1.5GB resident). 1B-1.5B Q4 rodam;
    # um 3B+ ainda da OOM neste box (precisa de VM maior). Rode o judge POST-scan
    # (sem scan concorrente disputando RAM). O LLM e opt-in; padrao usa OpenAI.
    mem_limit: 2g
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    networks:
      - suricatoos_network

networks:
  suricatoos_network:

volumes:
  tool_config:
  postgres_data_16:
  gf_patterns:
  nuclei_templates:
  wordlist:
  scan_results:
  static_volume:
  ollama_data:

