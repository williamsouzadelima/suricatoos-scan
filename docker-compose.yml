services:
  db:
    restart: always
    image: "postgres:12.3-alpine"
    # 3.8GB box shared with co-tenants: cap each container so a runaway tool is OOM-killed
    # inside its container (detectable, .State.OOMKilled) instead of starving the whole host.
    mem_limit: 384m
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - suricatoos_network

  redis:
    restart: always
    image: "redis:alpine"
    hostname: redis
    mem_limit: 256m
    networks:
      - suricatoos_network

  celery:
    build:
      context: ./web
    restart: always
    # Heaviest container (runs every scan tool). Cap RAM so a runaway tool is OOM-killed inside
    # this container instead of starving the host; a little swap headroom (Docker default) is
    # left as a buffer. Hangs are handled by the per-tool watchdog + Celery time limits.
    mem_limit: 2g
    entrypoint: /usr/src/app/celery-entrypoint.sh
    # command: celery -A Suricatoos worker --autoscale=${MAX_CONCURRENCY},${MIN_CONCURRENCY} -l INFO
    volumes:
      - ./web:/usr/src/app
      - github_repos:/usr/src/github
      - wordlist:/usr/src/wordlist
      - scan_results:/usr/src/scan_results
      - gf_patterns:/root/.gf
      - nuclei_templates:/root/nuclei-templates
      - tool_config:/root/.config
      - static_volume:/usr/src/app/staticfiles/
    environment:
      - DEBUG=0
      - CELERY_BROKER=redis://redis:6379/0
      - RENGINE_VAULT_KEY=${RENGINE_VAULT_KEY:-}
      - CELERY_BACKEND=redis://redis:6379/0
      - DOMAIN_NAME=${DOMAIN_NAME}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - MAX_CONCURRENCY=${MAX_CONCURRENCY}
      - MIN_CONCURRENCY=${MIN_CONCURRENCY}
      - SHARED_CONCURRENCY=${SHARED_CONCURRENCY:-10}
      - GITGUARDIAN_API_KEY=${GITGUARDIAN_API_KEY}
    depends_on:
      - db
      - redis
    networks:
      - suricatoos_network

  celery-beat:
    build: ./web
    entrypoint: /usr/src/app/beat-entrypoint.sh
    command: celery -A Suricatoos beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - CELERY_BROKER=redis://redis:6379/0
      - RENGINE_VAULT_KEY=${RENGINE_VAULT_KEY:-}
      - CELERY_BACKEND=redis://redis:6379/0
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_HOST=${POSTGRES_HOST}
    depends_on:
      - celery
      - db
    volumes:
      - ./web:/usr/src/app
      - github_repos:/usr/src/github
      - wordlist:/usr/src/wordlist
      - scan_results:/usr/src/scan_results
      - gf_patterns:/root/.gf
      - nuclei_templates:/root/nuclei-templates
      - tool_config:/root/.config
    networks:
      - suricatoos_network

  web:
    build:
      context: ./web
    entrypoint: /usr/src/app/entrypoint.sh
    restart: always
    mem_limit: 640m
    image: suricatoos/web:latest
    environment:
      - DEBUG=0
      - CELERY_BROKER=redis://redis:6379/0
      - RENGINE_VAULT_KEY=${RENGINE_VAULT_KEY:-}
      - CELERY_BACKEND=redis://redis:6379/0
      - DOMAIN_NAME=${DOMAIN_NAME}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
    volumes:
      - ./web:/usr/src/app
      - github_repos:/usr/src/github
      - wordlist:/usr/src/wordlist
      - scan_results:/usr/src/scan_results
      - gf_patterns:/root/.gf
      - nuclei_templates:/root/nuclei-templates
      - tool_config:/root/.config
      - static_volume:/usr/src/app/staticfiles/
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - db
      - celery
      - celery-beat
    networks:
      suricatoos_network:
        aliases:
          - suricatoos

  proxy:
    restart: always
    image: nginx:alpine
    ports:
      - 8082:8082/tcp
      - 443:443/tcp
    depends_on:
      - web
      - db
      - redis
    secrets:
      - source: proxy.ca
        target: /etc/nginx/certs/suricatoos_chain.pem
      - source: proxy.cert
        target: /etc/nginx/certs/suricatoos.pem
      - source: proxy.key
        target: /etc/nginx/certs/suricatoos_rsa.key
    volumes:
      - ./config/nginx/suricatoos.conf:/etc/nginx/conf.d/suricatoos.conf:ro
      - static_volume:/usr/src/app/staticfiles/
      - scan_results:/usr/src/scan_results
    networks:
      - suricatoos_network
  ollama:
    image: ollama/ollama
    container_name: ollama
    # VM pequena (3.8GB): ollama ocioso e leve, mas carregar um modelo em CPU
    # pode consumir toda a RAM e travar o host. O limite contem o ollama (ele
    # sofre OOM-kill em vez de derrubar a maquina inteira).
    # ATENCAO: 1g fica ABAIXO do footprint de qualquer modelo real (ate um 2-3B Q4
    # precisa de ~2-3GB com runtime+KV cache), entao com este teto o LLM LOCAL fica
    # efetivamente DESLIGADO (OOM no primeiro inference). Isso e seguro: o LLM e
    # opt-in e o app usa OpenAI por padrao. Para rodar modelo local de verdade,
    # suba este limite E use uma VM maior.
    mem_limit: 1g
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - suricatoos_network

networks:
  suricatoos_network:

volumes:
  tool_config:
  postgres_data:
  gf_patterns:
  nuclei_templates:
  github_repos:
  wordlist:
  scan_results:
  static_volume:
  ollama_data:

secrets:
  proxy.ca:
    file: ./secrets/certs/suricatoos_chain.pem
  proxy.key:
    file: ./secrets/certs/suricatoos_rsa.key
  proxy.cert:
    file: ./secrets/certs/suricatoos.pem
